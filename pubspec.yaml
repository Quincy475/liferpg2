name: household_rpg
description: Co-op household RPG met lichte competitie (tasks, skills, shop, raid, events).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"   # aangepast aan jouw Dart 3.1.0

dependencies:
  cloud_firestore: ^4.14.0
  equatable: ^2.0.7
  firebase: ^9.0.3
  firebase_auth: ^4.16.0
  flame: ^1.15.0
  flame_audio: ^2.1.8
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.10
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
 
  # BELANGRIJK: GEEN expliciete 'collection' dependency, die veroorzaakt de pin-conflict met flutter_test

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    -  assets/pets/cat/
    -  assets/rooms/
    -  assets/objects/
    -  assets/rooms_large/
