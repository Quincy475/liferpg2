name: household_rpg
description: Co-op household RPG met lichte competitie (tasks, skills, shop).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0"   # aangepast aan jouw Dart 3.1.0

dependencies:
  cloud_firestore: ^5.6.12
  equatable: ^2.0.7
  firebase: ^9.0.3
  firebase_auth: ^5.7.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
 
  # BELANGRIJK: GEEN expliciete 'collection' dependency, die veroorzaakt de pin-conflict met flutter_test

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
